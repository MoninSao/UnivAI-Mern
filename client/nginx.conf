# Minimal nginx config for serving the Vite SPA build.
# The key bit is `try_files $uri /index.html` — without it, refreshing on
# /universities or /recommendations would return a 404 because those routes
# only exist in React Router, not on disk.

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Try to serve the requested file, then a directory, then fall back to index.html
    # This is the standard SPA pattern — lets React Router handle all routes client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite hashes filenames so this is safe)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
